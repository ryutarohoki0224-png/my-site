<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇳 インド | 旅の記録</title>
<style>
body{font-family:system-ui,sans-serif;background:#f5f7fa;margin:0;padding:20px}
.back{display:inline-block;margin-bottom:15px;color:#333;text-decoration:none;font-weight:bold}
h1{color:#8b5cf6;text-align:center;margin:20px 0}
.grid{column-count:3;column-gap:0;max-width:1100px;margin:0 auto;opacity:0;transition:opacity 0.5s ease}
.grid.loaded{opacity:1}
.instagram-media{width:100%!important;min-width:unset!important;margin-bottom:0!important;break-inside:avoid;min-height:420px;background:#f0f0f0}
@media(max-width:800px){.grid{column-count:2}}@media(max-width:500px){.grid{column-count:1}}
</style>
</head>
<body>
<a href="index.html" class="back">← 地域一覧に戻る</a>
<h1>🇮🇳 インドの記録</h1>
<div class="grid" id="instaGrid">
<blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/Crpyykotuny/" data-instgrm-captioned data-instgrm-version="14"></blockquote>
<blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/CrpQzcYPknY/" data-instgrm-captioned data-instgrm-version="14"></blockquote>
<blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/Crm40lqtJpP/" data-instgrm-captioned data-instgrm-version="14"></blockquote>
<blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/Crla_MivI-9/" data-instgrm-captioned data-instgrm-version="14"></blockquote>
</div>
<script async defer src="//www.instagram.com/embed.js"></script>
<script>
window.addEventListener('load',function(){setTimeout(function(){document.getElementById('instaGrid').classList.add('loaded')},500)});
</script>
</body>
</html>
