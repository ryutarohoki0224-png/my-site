<style>
body{font-family:system-ui,sans-serif;background:#f5f7fa;margin:0;padding:20px}
.back{display:inline-block;margin-bottom:15px;color:#333;text-decoration:none;font-weight:bold}
h1{color:#ef4444;text-align:center;margin:20px 0}

.grid {
    column-count: 3;
    column-gap: 0;
    max-width: 1100px;
    margin: 0 auto;
    opacity: 0;           /* ← 最初は非表示 */
    transition: opacity 0.5s ease;
}
.grid.loaded {
    opacity: 1;           /* ← 読み込み完了で表示 */
}
.instagram-media {
    width: 100% !important;
    min-width: unset !important;
    margin-bottom: 0 !important;
    break-inside: avoid;
    min-height: 420px;
    background: #f0f0f0;   /* ← ローディング中のスケルトン */
}
@media (max-width: 800px) { .grid { column-count: 2; } }
@media (max-width: 500px) { .grid { column-count: 1; } }
</style>
</head>
