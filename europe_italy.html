<script async defer src="//www.instagram.com/embed.js"></script>
<script>
// 初期表示：フェードイン
window.addEventListener('load',function(){
  setTimeout(function(){document.getElementById('instaGrid').classList.add('loaded')},500);
});

// 「もっと見る」ボタン機能
let batchCount = 1;
const totalBatches = 3;
const remainingPosts = [27, 7]; // Batch2:27件, Batch3:7件

document.getElementById('loadMoreBtn').addEventListener('click', function() {
  const btn = this;
  
  if (batchCount === 1) {
    // Batch2を表示
    document.getElementById('batch2').style.display = 'block';
    batchCount = 2;
    btn.textContent = `もっと見る（${remainingPosts[1]}件）`;
  } else if (batchCount === 2) {
    // Batch3を表示
    document.getElementById('batch3').style.display = 'block';
    batchCount = 3;
    btn.textContent = 'すべて表示しました';
    btn.disabled = true;
  }
  
  // 再読み込み（新しい投稿も表示されるように）
  if (window.instgrm && window.instgrm.Embeds) {
    window.instgrm.Embeds.process();
  }
});
</script>
